services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: fajar_user
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: notes_db
    volumes:
      - pgdata:/var/lib/postgresql/data  
    ports:
      - "5432:5432" # Allows you to connect via pgAdmin on Windows

  api:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    depends_on:
      - db

    env_file:
      - .env

volumes:
  pgdata: # This tells Docker to manage the 'pgdata' storage